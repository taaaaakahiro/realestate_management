name: Deploy to GitHub Pages

on:
  # main へのマージで自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（古いデプロイをキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # macOS 生成の lockfile には linux 用 optional 依存（lightningcss/@tailwindcss/oxide）が
      # 含まれず CI で解決されないため、lockfile を破棄して当該OS向けに新規インストールする
      - run: rm -f package-lock.json && npm install

      - name: Build (Vite)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
